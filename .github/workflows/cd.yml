name: CD
on:
  push:
    branches:
      - main
concurrency: production
jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: "0"

      - name: Determine semver
        id: semver
        uses: anothrNick/github-tag-action@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          MAJOR_STRING_TOKEN: major
          MINOR_STRING_TOKEN: minor
          PATCH_STRING_TOKEN: patch
          NONE_STRING_TOKEN: skip
          DRY_RUN: true

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .node-version
          cache: npm

      - name: Install dependencies
        run: npm ci --force    # bypass package.json `os: [darwin]` guard

      - name: Set package version
        run: npm version --no-git-tag-version "${{ steps.semver.outputs.new_tag }}"

      - name: Run tests
        run: npm test

      - name: Build bundled CLI
        run: npm run build

      - name: Create release tarball
        id: tarball
        run: |
          set -euo pipefail
          VERSION="${{ steps.semver.outputs.new_tag }}"
          STAGE="macos-fresh-${VERSION}"
          mkdir -p "${STAGE}"
          cp -R dist "${STAGE}/"
          cp package.json README.md LICENSE "${STAGE}/"
          tar -czf "${STAGE}.tar.gz" "${STAGE}"
          echo "tarball=${STAGE}.tar.gz" >> "$GITHUB_OUTPUT"

      - name: Add semver tag
        run: |
          git tag ${{ steps.semver.outputs.new_tag }}
          git push --tags

      - name: Create GitHub release
        run: gh release create ${{ steps.semver.outputs.new_tag }} ${{ steps.tarball.outputs.tarball }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Bump Homebrew formula
        uses: mislav/bump-homebrew-formula-action@v3
        with:
          tag-name: ${{ steps.semver.outputs.new_tag }}
          homebrew-tap: d3v1an7/homebrew-taps
          formula-name: macos-fresh
          download-url: https://github.com/d3v1an7/macos-fresh/releases/download/${{ steps.semver.outputs.new_tag }}/macos-fresh-${{ steps.semver.outputs.new_tag }}.tar.gz
        env:
          COMMITTER_TOKEN: ${{ secrets.COMMITTER_TOKEN }}
