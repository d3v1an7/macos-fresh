name: CD
on:
  push:
    tags: ['[0-9]+.[0-9]+.[0-9]+']
  workflow_dispatch:
    inputs:
      tag:
        description: 'Existing tag to (re-)release, e.g. 1.0.2'
        required: true
        type: string
concurrency: production
jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      TAG: ${{ github.event.inputs.tag || github.ref_name }}
    steps:
      - name: Checkout at tag
        uses: actions/checkout@v4
        with:
          ref: ${{ env.TAG }}
          fetch-depth: 0

      - name: Probe COMMITTER_TOKEN (fail fast)
        env:
          COMMITTER_TOKEN: ${{ secrets.COMMITTER_TOKEN }}
        run: |
          if [ -z "$COMMITTER_TOKEN" ]; then
            echo "::error::COMMITTER_TOKEN secret is not set"; exit 1
          fi
          status=$(curl -sS -o /dev/null -w "%{http_code}" \
            -H "Authorization: Bearer $COMMITTER_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/d3v1an7/homebrew-taps/contents/Formula/macos-fresh.rb")
          if [ "$status" != "200" ]; then
            echo "::error::COMMITTER_TOKEN cannot read d3v1an7/homebrew-taps/Formula/macos-fresh.rb (HTTP $status)"
            exit 1
          fi

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .node-version
          cache: npm

      - run: npm ci
      - run: npm test
      - run: npm run build

      # No version sync needed: `npm version` locally already committed the
      # bump before tagging, so the tag's tree has the right version.

      - name: Create release tarball
        id: tarball
        run: |
          set -euo pipefail
          STAGE="macos-fresh-${TAG}"
          mkdir -p "$STAGE"
          cp -R dist "$STAGE/"
          cp package.json README.md LICENSE "$STAGE/"
          tar -czf "${STAGE}.tar.gz" "$STAGE"
          echo "tarball=${STAGE}.tar.gz" >> "$GITHUB_OUTPUT"

      - name: Publish GitHub release (idempotent)
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.TAG }}
          files: ${{ steps.tarball.outputs.tarball }}
          fail_on_unmatched_files: true

      - name: Bump Homebrew formula
        uses: mislav/bump-homebrew-formula-action@v3
        with:
          tag-name: ${{ env.TAG }}
          homebrew-tap: d3v1an7/homebrew-taps
          formula-name: macos-fresh
          download-url: https://github.com/d3v1an7/macos-fresh/releases/download/${{ env.TAG }}/macos-fresh-${{ env.TAG }}.tar.gz
        env:
          COMMITTER_TOKEN: ${{ secrets.COMMITTER_TOKEN }}
